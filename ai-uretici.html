<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merak - Yapay Zeka İçerik Üretici</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { color: #8b5cf6; text-align: center; }
    .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    label { display: block; margin-bottom: 8px; font-weight: bold; color: #94a3b8; }
    input, select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; margin-bottom: 15px; box-sizing: border-box; }
    button { background: #8b5cf6; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s; }
    button:hover { background: #7c3aed; }
    button:disabled { background: #475569; cursor: not-allowed; }
    .status { margin-top: 15px; padding: 15px; border-radius: 6px; background: #0f172a; border: 1px solid #334155; min-height: 50px; }
    .log { font-family: monospace; font-size: 0.9em; color: #10b981; margin: 5px 0; }
    .log.error { color: #ef4444; }
    .row { display: flex; gap: 15px; }
    .col { flex: 1; }
  </style>
</head>
<body>

<div class="container">
  <h1>🧠 Merak.io Yapay Zeka İçerik Aracı</h1>
  
  <div class="card">
    <div class="row">
      <div class="col">
        <label for="apiKey">Google Gemini API Anahtarı</label>
        <input type="password" id="apiKey" placeholder="AIzaSy...">
      </div>
      <div class="col">
        <label for="categorySelect">Kategori Seç</label>
        <select id="categorySelect"></select>
      </div>
      <div class="col">
        <label for="diffSelect">Zorluk Seç</label>
        <select id="diffSelect">
          <option value="kolay">Kolay</option>
          <option value="orta">Orta</option>
          <option value="zor">Zor</option>
        </select>
      </div>
    </div>
    <button id="scanBtn" onclick="eksikleriBul()">Açıklaması Eksik Soruları Bul</button>
  </div>

  <div class="card" id="actionCard" style="display:none;">
    <h3 style="margin-top:0">Hedef: <span id="targetCount">0</span> soruya açıklama üretilecek</h3>
    <button id="startBtn" onclick="uretimiBaslat()">🚀 Üretimi Başlat (API'ye Bağlan)</button>
    
    <div class="status" id="statusBox">Bekliyor...</div>
  </div>

  <div class="card" id="outputCard" style="display:none;">
    <label>Yeni Çıktı (Sorular.js içine kopyala/yapıştır yapabilirsin):</label>
    <textarea id="outputArea" rows="20" readonly></textarea>
  </div>
</div>

<!-- Mevcut veri havuzunu içeri aktar -->
<script src="sorular.js"></script>

<script>
  let hedefSorular = [];
  let orjinalDizi = [];

  // Sayfa yüklendiğinde kategorileri doldur
  window.onload = () => {
    const catSelect = document.getElementById('categorySelect');
    for (const kat in SORU_HAVUZU) {
      const opt = document.createElement('option');
      opt.value = kat;
      opt.textContent = KATEGORI_BILGI[kat]?.isim || kat;
      catSelect.appendChild(opt);
    }
  };

  function logYaz(mesaj, tip = 'info') {
    const box = document.getElementById('statusBox');
    const div = document.createElement('div');
    div.className = `log ${tip}`;
    div.textContent = `[${new Date().toLocaleTimeString()}] ${mesaj}`;
    box.insertBefore(div, box.firstChild);
  }

  function eksikleriBul() {
    const kat = document.getElementById('categorySelect').value;
    const zorluk = document.getElementById('diffSelect').value;
    
    if (!SORU_HAVUZU[kat] || !SORU_HAVUZU[kat][zorluk]) {
      alert('Bu kategori ve zorlukta soru bulunamadı.');
      return;
    }

    orjinalDizi = JSON.parse(JSON.stringify(SORU_HAVUZU[kat][zorluk]));
    hedefSorular = orjinalDizi.filter(s => !s.e || s.e.trim() === '');

    document.getElementById('targetCount').textContent = hedefSorular.length;
    document.getElementById('actionCard').style.display = 'block';
    document.getElementById('outputCard').style.display = 'none';
    document.getElementById('statusBox').innerHTML = '';
    
    logYaz(`${kat} - ${zorluk} için ${hedefSorular.length} adet açıklama bekleyen soru bulundu.`);
  }

  async function uretimiBaslat() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) {
      alert('Lütfen bir Gemini API anahtarı girin!');
      return;
    }

    if (hedefSorular.length === 0) {
      logYaz('İşlenecek soru yok.', 'error');
      return;
    }

    const startBtn = document.getElementById('startBtn');
    startBtn.disabled = true;

    for (let i = 0; i < hedefSorular.length; i++) {
      const soruObj = hedefSorular[i];
      const dogruCevap = soruObj.o[soruObj.a];
      
      const prompt = `Sen zeki, eğlenceli ve kültürlü bir bilgi yarışması sunucususun. 
Soru: "${soruObj.q}"
Doğru Cevap: "${dogruCevap}"

Bana bu doğru cevapla ilgili, "Meraklı yetişkinler her gün 1 şey öğrenir" konseptine uygun, okuyan kişiyi şaşırtacak veya ona "vay be" dedirtecek çok kısa 1 (maksimum 2) cümlelik bir ekstra bilgi (açıklama) yaz.
Sadece açıklamayı düz metin olarak ver. Merhaba, işte açıklama vb. kelimeler kullanma.`;

      try {
        logYaz(`İşleniyor (${i+1}/${hedefSorular.length}): ${soruObj.q.substring(0, 30)}...`);
        
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.7, maxOutputTokens: 100 }
          })
        });

        const data = await response.json();
        
        if (data.error) {
          logYaz(`API Hatası: ${data.error.message}`, 'error');
          break;
        }

        let aciklama = data.candidates[0].content.parts[0].text.trim();
        // Tırnak işaretleri ve fazlalıkları temizle
        aciklama = aciklama.replace(/^["']|["']$/g, '');
        
        soruObj.e = aciklama;
        logYaz(`✅ Üretildi: ${aciklama}`);
        
        // Rate limit'e takılmamak için 1 saniye bekle
        await new Promise(r => setTimeout(r, 1000));
        
      } catch (err) {
        logYaz(`Ağ Hatası: ${err.message}`, 'error');
        break;
      }
    }

    // Çıktıyı hazırlama (orjinal diziyi güncelleyerek JSON formatına çevirme)
    // Objeleri JavaScript nesnesi formatında (string olarak) yazdırmak için
    const formattedOutput = "[\n" + orjinalDizi.map(s => {
      let options = `["${s.o.join('", "')}"]`;
      return `  { q: "${s.q.replace(/"/g, '\\"')}", o: ${options}, a: ${s.a}, e: "${(s.e || '').replace(/"/g, '\\"')}" }`;
    }).join(",\n") + "\n]";

    document.getElementById('outputArea').value = formattedOutput;
    document.getElementById('outputCard').style.display = 'block';
    logYaz('🎉 İşlem tamamlandı! Aşağıdaki çıktıyı kopyalayarak sorular.js dosyanı güncelleyebilirsin.');
    startBtn.disabled = false;
  }
</script>

</body>
</html>
