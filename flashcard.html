<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard — merak.io</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0b10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    padding: 24px 16px;
  }

  /* Arka plan orb'ları */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(circle at 20% 30%, rgba(139,92,246,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(79,143,255,0.12) 0%, transparent 50%);
  }

  .header {
    position: relative; z-index: 1;
    text-align: center; margin-bottom: 32px;
  }
  .header .logo { font-size: 1.5rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .header .logo span { color: #8b5cf6; }
  .header .sub { font-size: 0.78rem; color: #64748b; margin-top: 4px; }

  /* İlerleme */
  .progress-row {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 12px;
    width: 100%; max-width: 420px; margin-bottom: 24px;
  }
  .progress-bar {
    flex: 1; height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #8b5cf6, #4f8fff);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 10%;
  }
  .progress-text { font-size: 0.72rem; color: #64748b; white-space: nowrap; }

  /* Kart wrapper — perspektif için */
  .card-wrapper {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    height: 280px;
    perspective: 1000px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-wrapper.flipped .card-inner {
    transform: rotateY(180deg);
  }

  /* Ön ve arka yüz ortak */
  .card-front, .card-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 20px;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* ÖN YÜZ */
  .card-front {
    background: linear-gradient(145deg, #12162a, #0f1220);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(139,92,246,0.15);
  }
  .card-front .kategori {
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: #8b5cf6; margin-bottom: 16px;
  }
  .card-front .soru {
    font-size: 1.15rem; font-weight: 600; color: #f1f5f9;
    line-height: 1.55;
  }
  .card-front .hint {
    margin-top: 20px; font-size: 0.7rem; color: #334155;
    display: flex; align-items: center; gap: 6px;
  }
  .card-front .hint::before, .card-front .hint::after {
    content: ''; flex: 1; height: 1px; background: #1e293b;
  }

  /* ARKA YÜZ */
  .card-back {
    background: linear-gradient(145deg, #150d2a, #0f0a1e);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(139,92,246,0.3);
    transform: rotateY(180deg);
  }
  .card-back .cevap-label {
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: #10b981; margin-bottom: 12px;
  }
  .card-back .cevap {
    font-size: 1.35rem; font-weight: 800; color: #a78bfa;
    margin-bottom: 14px;
  }
  .card-back .aciklama {
    font-size: 0.82rem; color: #94a3b8; line-height: 1.6;
    border-top: 1px solid rgba(139,92,246,0.15);
    padding-top: 12px;
  }

  /* Butonlar */
  .btn-row {
    position: relative; z-index: 1;
    display: flex; gap: 10px;
    width: 100%; max-width: 420px;
    margin-top: 20px;
  }
  .btn {
    flex: 1; padding: 13px;
    border: none; border-radius: 12px;
    font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }
  .btn-bilmiyorum {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #ef4444;
  }
  .btn-bilmiyorum:hover { background: rgba(239,68,68,0.18); }
  .btn-biliyorum {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    color: #10b981;
  }
  .btn-biliyorum:hover { background: rgba(16,185,129,0.18); }

  .btn-row { display: none; }
  .btn-row.show { display: flex; }

  /* Tamamlandı ekranı */
  .bitis {
    position: relative; z-index: 1;
    display: none; flex-direction: column; align-items: center;
    text-align: center; gap: 12px;
  }
  .bitis.show { display: flex; }
  .bitis-emoji { font-size: 3.5rem; }
  .bitis-baslik { font-size: 1.4rem; font-weight: 800; color: #f1f5f9; }
  .bitis-alt { font-size: 0.85rem; color: #64748b; }
  .bitis-stats {
    display: flex; gap: 20px; margin: 8px 0;
  }
  .bitis-stat { text-align: center; }
  .bitis-stat .val { font-size: 1.6rem; font-weight: 800; color: #a78bfa; }
  .bitis-stat .lbl { font-size: 0.7rem; color: #64748b; }
  .btn-tekrar {
    padding: 13px 32px; background: linear-gradient(135deg, #8b5cf6, #4f8fff);
    border: none; border-radius: 12px; color: white;
    font-size: 0.88rem; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: opacity 0.2s;
  }
  .btn-tekrar:hover { opacity: 0.85; }

  @media (max-width: 480px) {
    .card-wrapper { height: 260px; }
    .card-front, .card-back { padding: 24px 20px; }
    .card-front .soru { font-size: 1rem; }
    .card-back .cevap { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">merak<span>.io</span></div>
  <div class="sub">Flashcard — Öğren & Tekrar Et</div>
</div>

<div class="progress-row" id="progressRow">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">1 / 10</div>
</div>

<div class="card-wrapper" id="cardWrapper" onclick="kartiCevir()">
  <div class="card-inner" id="cardInner">
    <div class="card-front">
      <div class="kategori" id="kartKategori">Bilim</div>
      <div class="soru" id="kartSoru">Yükleniyor...</div>
      <div class="hint">kartı çevir</div>
    </div>
    <div class="card-back">
      <div class="cevap-label">Cevap</div>
      <div class="cevap" id="kartCevap"></div>
      <div class="aciklama" id="kartAciklama"></div>
    </div>
  </div>
</div>

<div class="btn-row" id="btnRow">
  <button class="btn btn-bilmiyorum" onclick="sonraki(false)">✗ Bilmiyorum</button>
  <button class="btn btn-biliyorum" onclick="sonraki(true)">✓ Bildim</button>
</div>

<div class="bitis" id="bitisEkrani">
  <div class="bitis-emoji">🎉</div>
  <div class="bitis-baslik">Tebrikler!</div>
  <div class="bitis-alt">Bugünkü kartları tamamladın</div>
  <div class="bitis-stats">
    <div class="bitis-stat"><div class="val" id="bitisB">0</div><div class="lbl">Bildim</div></div>
    <div class="bitis-stat"><div class="val" id="bitisT">0</div><div class="lbl">Toplam</div></div>
  </div>
  <button class="btn-tekrar" onclick="baslat()">🔄 Tekrar Et</button>
</div>

<script>
  // Örnek veri — ileride SORU_HAVUZU'ndan çekilecek
  const KARTLAR = [
    { kategori: 'Bilim', soru: 'Işığın vakumdaki hızı kaç km/s\'dir?', cevap: '~300.000 km/s', aciklama: 'Işık, saniyede yaklaşık 299.792 km yol alır. Bu evrenin bilinen en hızlı hızıdır.' },
    { kategori: 'Tarih', soru: 'Osmanlı İmparatorluğu hangi yılda kurulmuştur?', cevap: '1299', aciklama: 'Osman Gazi liderliğinde kurulan bu devlet, 600 yılı aşkın süren bir imparatorluğun çekirdeğini oluşturdu.' },
    { kategori: 'Coğrafya', soru: 'Dünyanın en uzun nehri hangisidir?', cevap: 'Nil Nehri', aciklama: 'Nil, yaklaşık 6.650 km uzunluğuyla dünyanın en uzun nehri kabul edilir.' },
    { kategori: 'Astronomi', soru: 'Güneş Sistemi\'nin en büyük gezegeni hangisidir?', cevap: 'Jüpiter', aciklama: 'Jüpiter o kadar büyüktür ki Dünya\'nın 1.300 katı sığabilir.' },
    { kategori: 'Biyoloji', soru: 'İnsan vücudunda kaç kemik bulunur?', cevap: '206 kemik', aciklama: 'Yetişkin bir insanda 206 kemik bulunur. Bebekler 270-300 kemikle doğar, büyüdükçe kaynaşır.' },
    { kategori: 'Teknoloji', soru: 'WWW\'yi kim icat etmiştir?', cevap: 'Tim Berners-Lee', aciklama: '1989\'da CERN\'de çalışan Tim Berners-Lee, World Wide Web\'i icat ederek interneti herkes için erişilebilir kıldı.' },
    { kategori: 'Sanat', soru: 'Mona Lisa\'yı kim yazmıştır?', cevap: 'Leonardo da Vinci', aciklama: '1503-1519 yılları arasında yapıldığı tahmin edilen Mona Lisa, Paris\'teki Louvre Müzesi\'nde sergilenmektedir.' },
    { kategori: 'Matematik', soru: 'Pi sayısının ilk 3 basamağı nedir?', cevap: '3.14', aciklama: 'Pi (π), bir çemberin çevresinin çapına oranıdır ve 3.14159... şeklinde sonsuza uzanır.' },
    { kategori: 'Müzik', soru: 'Beethoven kaç senfonisi ile tanınır?', cevap: '9 Senfoni', aciklama: 'Beethoven\'ın 9. Senfonisi, bestecinin sağır olduğu dönemde yazdığı en büyük eserlerden biridir.' },
    { kategori: 'Edebiyat', soru: 'Don Kişot\'un yazarı kimdir?', cevap: 'Miguel de Cervantes', aciklama: '1605\'te yayımlanan Don Kişot, modern romanın ilk örneği kabul edilir.' },
  ];

  let index = 0;
  let cevrildi = false;
  let bildiSayisi = 0;
  let kilidi = false; // animasyon sırasında tıklamayı engeller

  function baslat() {
    index = 0;
    bildiSayisi = 0;
    cevrildi = false;
    kilidi = false;
    document.getElementById('bitisEkrani').classList.remove('show');
    document.getElementById('cardWrapper').style.display = 'block';
    document.getElementById('progressRow').style.display = 'flex';
    kartGoster();
  }

  function kartGoster() {
    const k = KARTLAR[index];
    document.getElementById('kartKategori').textContent = k.kategori;
    document.getElementById('kartSoru').textContent = k.soru;
    document.getElementById('kartCevap').textContent = k.cevap;
    document.getElementById('kartAciklama').textContent = k.aciklama || '';
    document.getElementById('cardWrapper').classList.remove('flipped');
    document.getElementById('btnRow').classList.remove('show');
    cevrildi = false;
    const pct = ((index + 1) / KARTLAR.length) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = (index + 1) + ' / ' + KARTLAR.length;
  }

  function kartiCevir() {
    if (kilidi) return;
    kilidi = true;
    document.getElementById('cardWrapper').classList.toggle('flipped');
    cevrildi = !cevrildi;
    if (cevrildi) document.getElementById('btnRow').classList.add('show');
    else document.getElementById('btnRow').classList.remove('show');
    setTimeout(() => { kilidi = false; }, 600);
  }

  function sonraki(bildi) {
    if (kilidi) return;
    kilidi = true;
    if (bildi) bildiSayisi++;
    index++;

    document.getElementById('btnRow').classList.remove('show');
    document.getElementById('cardWrapper').classList.remove('flipped');
    cevrildi = false;

    if (index >= KARTLAR.length) {
      setTimeout(() => { bitisGoster(); kilidi = false; }, 300);
      return;
    }

    // Kart tam ortada (görünmez) olduğunda içeriği güncelle, sonra ön yüze aç
    setTimeout(() => {
      kartGoster();
      kilidi = false;
    }, 280);
  }

  function bitisGoster() {
    document.getElementById('cardWrapper').style.display = 'none';
    document.getElementById('progressRow').style.display = 'none';
    document.getElementById('btnRow').classList.remove('show');
    document.getElementById('bitisB').textContent = bildiSayisi;
    document.getElementById('bitisT').textContent = KARTLAR.length;
    document.getElementById('bitisEkrani').classList.add('show');
  }

  baslat();
</script>
</body>
</html>
