<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="shSm">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>
  <ellipse cx="250" cy="250" rx="220" ry="220" fill="url(#centerGlow)"/>

  <!-- Stars -->
  <circle cx="35"  cy="40"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="80"  cy="22"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="140" cy="55"  r="1.8" fill="white" opacity="0.8"/>
  <circle cx="420" cy="30"  r="1.5" fill="white" opacity="0.75"/>
  <circle cx="465" cy="65"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="480" cy="25"  r="2"   fill="white" opacity="0.85"/>
  <circle cx="50"  cy="440" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="450" cy="450" r="1.5" fill="white" opacity="0.65"/>
  <circle cx="30"  cy="280" r="1"   fill="white" opacity="0.5"/>
  <circle cx="470" cy="280" r="1"   fill="white" opacity="0.5"/>
  <!-- Bright star -->
  <circle cx="72" cy="72" r="2.5" fill="white" opacity="0.9"/>
  <line x1="72" y1="64" x2="72" y2="80" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="64" y1="72" x2="80" y2="72" stroke="white" stroke-width="0.7" opacity="0.4"/>

  <!-- ── TOP ROW: 2 flags ── -->

  <!-- Flag 1 — Turkey (top-left, centered around 155,175) -->
  <rect x="60" y="100" width="190" height="115" rx="8" fill="#dc2626" filter="url(#sh)"/>
  <!-- Crescent -->
  <circle cx="128" cy="157" r="30" fill="white"/>
  <circle cx="140" cy="157" r="22" fill="#dc2626"/>
  <!-- Star -->
  <polygon points="163,157 167,145 171,157 183,157 173,164 177,176 167,169 157,176 161,164 151,157"
           fill="white"/>
  <!-- Sheen -->
  <rect x="60" y="100" width="190" height="20" rx="8" fill="white" opacity="0.06"/>

  <!-- Flag 2 — Japan (top-right, centered around 345,175) -->
  <rect x="250" y="100" width="190" height="115" rx="8" fill="white" filter="url(#sh)"/>
  <circle cx="345" cy="157" r="36" fill="#dc2626"/>
  <rect x="250" y="100" width="190" height="20" rx="8" fill="white" opacity="0.08"/>

  <!-- ── BOTTOM ROW: 2 flags ── -->

  <!-- Flag 3 — France (bottom-left, centered around 155,340) -->
  <rect x="60" y="268" width="190" height="115" rx="8" fill="#2563eb" filter="url(#sh)"/>
  <rect x="123" y="268" width="64" height="115" fill="white"/>
  <rect x="187" y="268" width="63" height="115" rx="8" fill="#dc2626"/>
  <!-- Fix top-left corner radius for middle/right blocks -->
  <rect x="123" y="268" width="64" height="8" fill="#2563eb"/>
  <rect x="60" y="100" width="0" height="0"/>
  <rect x="60" y="268" width="190" height="20" rx="8" fill="white" opacity="0.06"/>

  <!-- Flag 4 — Germany (bottom-right, centered around 345,340) -->
  <rect x="250" y="268" width="190" height="38" rx="8" fill="#1c1917"/>
  <rect x="250" y="306" width="190" height="39" fill="#dc2626"/>
  <rect x="250" y="345" width="190" height="38" rx="8" fill="#eab308"/>
  <!-- top corners for middle/bottom strips -->
  <rect x="250" y="268" width="190" height="20" rx="8" fill="#1c1917" opacity="0.5"/>
  <rect x="250" y="268" width="190" height="20" rx="8" fill="white" opacity="0.05"/>

  <!-- Centre divider hint -->
  <line x1="237" y1="95" x2="237" y2="390" stroke="white" stroke-width="1" opacity="0.06"/>
  <line x1="55"  y1="250" x2="445" y2="250" stroke="white" stroke-width="1" opacity="0.06"/>

  <!-- Globe watermark bottom-right -->
  <circle cx="425" cy="410" r="52" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.25"/>
  <ellipse cx="425" cy="410" rx="52" ry="20" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.18"/>
  <line x1="425" y1="358" x2="425" y2="462" stroke="#3b82f6" stroke-width="1" opacity="0.18"/>
  <line x1="373" y1="410" x2="477" y2="410" stroke="#3b82f6" stroke-width="1" opacity="0.18"/>
</svg>
