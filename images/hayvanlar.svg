<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="45%" stop-color="#075985"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#365314"/>
      <stop offset="100%" stop-color="#1a2e05"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="60%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mane" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="face" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="500" height="500" fill="url(#sky)"/>

  <!-- Sun (top-right) -->
  <circle cx="400" cy="80" r="55" fill="url(#sun)" opacity="0.9"/>
  <line x1="400" y1="10"  x2="400" y2="0"   stroke="#fcd34d" stroke-width="3" opacity="0.6"/>
  <line x1="448" y1="32"  x2="455" y2="25"  stroke="#fcd34d" stroke-width="3" opacity="0.6"/>
  <line x1="470" y1="80"  x2="480" y2="80"  stroke="#fcd34d" stroke-width="3" opacity="0.6"/>
  <line x1="448" y1="128" x2="455" y2="135" stroke="#fcd34d" stroke-width="3" opacity="0.6"/>
  <line x1="352" y1="32"  x2="345" y2="25"  stroke="#fcd34d" stroke-width="3" opacity="0.6"/>
  <line x1="330" y1="80"  x2="320" y2="80"  stroke="#fcd34d" stroke-width="3" opacity="0.6"/>

  <!-- Clouds -->
  <ellipse cx="110" cy="95"  rx="65" ry="28" fill="white" opacity="0.25"/>
  <ellipse cx="145" cy="80"  rx="45" ry="30" fill="white" opacity="0.2"/>
  <ellipse cx="75"  cy="88"  rx="40" ry="22" fill="white" opacity="0.2"/>

  <!-- Distant mountains -->
  <polygon points="0,310 80,200 160,280 240,190 320,255 400,185 500,250 500,340 0,340"
           fill="#164e63" opacity="0.6"/>
  <polygon points="0,330 100,240 200,300 300,225 400,275 500,240 500,350 0,350"
           fill="#155e75" opacity="0.5"/>

  <!-- Ground -->
  <rect x="0" y="350" width="500" height="150" fill="url(#ground)"/>
  <ellipse cx="250" cy="350" rx="260" ry="25" fill="#365314" opacity="0.8"/>
  <ellipse cx="250" cy="352" rx="240" ry="20" fill="#4d7c0f" opacity="0.5"/>

  <!-- Acacia tree (right) -->
  <rect x="398" y="220" width="14" height="140" rx="4" fill="#78350f"/>
  <ellipse cx="405" cy="205" rx="62" ry="22" fill="#15803d"/>
  <ellipse cx="405" cy="200" rx="55" ry="18" fill="#16a34a"/>
  <ellipse cx="405" cy="195" rx="48" ry="14" fill="#22c55e" opacity="0.7"/>

  <!-- Lion body — shifted left so head centers near (250,250) -->
  <ellipse cx="145" cy="385" rx="110" ry="58" fill="#d97706" filter="url(#shadow)"/>
  <!-- Legs -->
  <rect x="80"  y="415" width="30" height="50" rx="10" fill="#b45309"/>
  <rect x="125" y="425" width="28" height="45" rx="10" fill="#b45309"/>
  <rect x="175" y="425" width="28" height="45" rx="10" fill="#b45309"/>
  <rect x="215" y="415" width="30" height="50" rx="10" fill="#b45309"/>
  <!-- Tail -->
  <path d="M50,375 Q10,345 0,380 Q-10,415 20,425" fill="none" stroke="#d97706" stroke-width="14" stroke-linecap="round"/>
  <circle cx="18" cy="427" r="18" fill="#78350f"/>

  <!-- Mane (big circle behind head, centered at 250,248) -->
  <circle cx="250" cy="248" r="82" fill="url(#mane)" filter="url(#shadow)"/>

  <!-- Head (centered at 250,243) -->
  <circle cx="250" cy="243" r="65" fill="url(#face)"/>

  <!-- Ears -->
  <path d="M198,188 L185,158 L218,178 Z" fill="#f59e0b"/>
  <path d="M198,188 L190,166 L210,181 Z" fill="#fbbf24" opacity="0.5"/>
  <path d="M302,188 L315,158 L282,178 Z" fill="#f59e0b"/>
  <path d="M302,188 L310,166 L290,181 Z" fill="#fbbf24" opacity="0.5"/>

  <!-- Eyes -->
  <circle cx="228" cy="233" r="13" fill="#1c1917"/>
  <circle cx="272" cy="233" r="13" fill="#1c1917"/>
  <circle cx="228" cy="233" r="8"  fill="#92400e"/>
  <circle cx="272" cy="233" r="8"  fill="#92400e"/>
  <circle cx="230" cy="231" r="5"  fill="white"/>
  <circle cx="274" cy="231" r="5"  fill="white"/>
  <circle cx="231" cy="231" r="2.5" fill="#000"/>
  <circle cx="275" cy="231" r="2.5" fill="#000"/>

  <!-- Nose -->
  <ellipse cx="250" cy="258" rx="14" ry="10" fill="#92400e"/>
  <ellipse cx="250" cy="255" rx="10" ry="6"  fill="#b45309"/>

  <!-- Mouth -->
  <path d="M235,268 Q250,280 265,268" fill="none" stroke="#78350f" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="268" x2="250" y2="273" stroke="#78350f" stroke-width="3" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="198" y1="256" x2="228" y2="260" stroke="#fef3c7" stroke-width="1.5" opacity="0.8"/>
  <line x1="195" y1="266" x2="228" y2="265" stroke="#fef3c7" stroke-width="1.5" opacity="0.8"/>
  <line x1="302" y1="256" x2="272" y2="260" stroke="#fef3c7" stroke-width="1.5" opacity="0.8"/>
  <line x1="305" y1="266" x2="272" y2="265" stroke="#fef3c7" stroke-width="1.5" opacity="0.8"/>

  <!-- Birds -->
  <path d="M55,155 Q70,143 85,150"  fill="none" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <path d="M85,150 Q100,143 115,155" fill="none" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <path d="M25,170 Q38,160 50,165"  fill="none" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M50,165 Q63,160 75,170"  fill="none" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
</svg>
