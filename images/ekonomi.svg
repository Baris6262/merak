<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#061020"/>
    </linearGradient>
    <radialGradient id="coingrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
    <radialGradient id="coinglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="barYellow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Dark trading background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="100" x2="500" y2="100" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="200" x2="500" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="300" x2="500" y2="300" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="400" x2="500" y2="400" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="100" y1="0" x2="100" y2="500" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="300" y1="0" x2="300" y2="500" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>

  <!-- Bar chart bars -->
  <rect x="40" y="360" width="42" height="80" rx="4" fill="#1d4ed8" opacity="0.7"/>
  <rect x="95" y="310" width="42" height="130" rx="4" fill="#2563eb" opacity="0.7"/>
  <rect x="150" y="265" width="42" height="175" rx="4" fill="#1d4ed8" opacity="0.8"/>
  <rect x="205" y="220" width="42" height="220" rx="4" fill="#3b82f6" opacity="0.8"/>
  <rect x="260" y="175" width="42" height="265" rx="4" fill="url(#barYellow)"/>
  <rect x="315" y="128" width="42" height="312" rx="4" fill="url(#barGreen)"/>

  <!-- Baseline -->
  <line x1="30" y1="440" x2="370" y2="440" stroke="#4b5563" stroke-width="2"/>

  <!-- Trend line glow -->
  <polyline points="61,360 116,310 171,265 226,220 281,175 336,128"
            fill="none" stroke="#fbbf24" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.15" filter="url(#glow)"/>
  <!-- Trend line -->
  <polyline points="61,360 116,310 171,265 226,220 281,175 336,128"
            fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trend line dots -->
  <circle cx="61" cy="360" r="4" fill="#fbbf24"/>
  <circle cx="116" cy="310" r="4" fill="#fbbf24"/>
  <circle cx="171" cy="265" r="4" fill="#fbbf24"/>
  <circle cx="226" cy="220" r="4" fill="#fbbf24"/>
  <circle cx="281" cy="175" r="4" fill="#fbbf24"/>
  <circle cx="336" cy="128" r="5" fill="#fcd34d"/>

  <!-- Up arrow -->
  <polygon points="336,70 355,105 343,105 343,128 329,128 329,105 317,105" fill="#34d399"/>

  <!-- Large coin -->
  <circle cx="425" cy="220" r="68" fill="#fbbf24" opacity="0.15" filter="url(#glow)"/>
  <circle cx="425" cy="220" r="58" fill="url(#coingrad)"/>
  <circle cx="425" cy="220" r="50" fill="none" stroke="#fde68a" stroke-width="3" opacity="0.5"/>
  <!-- TL symbol -->
  <text x="425" y="237" text-anchor="middle" fill="#7c2d12" font-size="52" font-family="Arial,sans-serif" font-weight="900">₺</text>
  <!-- Coin shine -->
  <ellipse cx="410" cy="200" rx="18" ry="12" fill="white" opacity="0.25" transform="rotate(-25,410,200)"/>

  <!-- Small coins scattered -->
  <circle cx="430" cy="360" r="22" fill="#d97706"/>
  <circle cx="430" cy="360" r="18" fill="#fbbf24"/>
  <text x="430" y="368" text-anchor="middle" fill="#7c2d12" font-size="20" font-family="Arial,sans-serif" font-weight="bold">$</text>

  <circle cx="460" cy="430" r="15" fill="#d97706"/>
  <circle cx="460" cy="430" r="12" fill="#fbbf24"/>
</svg>
