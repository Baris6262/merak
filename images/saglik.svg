<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="60%" stop-color="#0f0505"/>
      <stop offset="100%" stop-color="#050000"/>
    </radialGradient>
    <radialGradient id="heartglow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#dc2626" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heart" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Subtle grid lines like medical monitor -->
  <line x1="0" y1="125" x2="500" y2="125" stroke="#1f2a1f" stroke-width="1"/>
  <line x1="0" y1="250" x2="500" y2="250" stroke="#1f2a1f" stroke-width="1"/>
  <line x1="0" y1="375" x2="500" y2="375" stroke="#1f2a1f" stroke-width="1"/>
  <line x1="125" y1="0" x2="125" y2="500" stroke="#1f2a1f" stroke-width="1"/>
  <line x1="250" y1="0" x2="250" y2="500" stroke="#1f2a1f" stroke-width="1"/>
  <line x1="375" y1="0" x2="375" y2="500" stroke="#1f2a1f" stroke-width="1"/>

  <!-- Heart glow -->
  <ellipse cx="250" cy="230" rx="175" ry="160" fill="url(#heartglow)" filter="url(#softglow)"/>

  <!-- Heart shape -->
  <path d="M250,370 C250,370 80,270 80,160 C80,100 120,65 165,72 C198,77 228,100 250,130 C272,100 302,77 335,72 C380,65 420,100 420,160 C420,270 250,370 250,370 Z" fill="url(#heart)"/>

  <!-- Heart shine/highlight -->
  <path d="M160,110 C145,130 138,155 142,178 C146,155 158,132 178,115 Z" fill="white" opacity="0.2"/>
  <ellipse cx="195" cy="135" rx="25" ry="18" fill="white" opacity="0.12" transform="rotate(-30,195,135)"/>

  <!-- Medical cross (white, centered in heart) -->
  <rect x="225" y="175" width="50" height="130" rx="10" fill="white" opacity="0.92"/>
  <rect x="170" y="230" width="160" height="50" rx="10" fill="white" opacity="0.92"/>

  <!-- EKG / pulse line -->
  <polyline points="0,415 60,415 85,415 100,380 118,445 135,370 155,415 190,415 220,390 245,340 265,430 285,415 330,415 500,415"
            fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- EKG glow -->
  <polyline points="0,415 60,415 85,415 100,380 118,445 135,370 155,415 190,415 220,390 245,340 265,430 285,415 330,415 500,415"
            fill="none" stroke="#4ade80" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.2"/>

  <!-- Stethoscope circle hint top-right -->
  <circle cx="400" cy="100" r="38" fill="none" stroke="#6b7280" stroke-width="6" opacity="0.5"/>
  <circle cx="400" cy="100" r="22" fill="none" stroke="#9ca3af" stroke-width="3" opacity="0.4"/>
  <line x1="400" y1="138" x2="400" y2="175" stroke="#6b7280" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <path d="M400,175 Q430,200 430,230" fill="none" stroke="#6b7280" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <circle cx="430" cy="240" r="12" fill="none" stroke="#9ca3af" stroke-width="4" opacity="0.5"/>
</svg>
